<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      padding: 30px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #333;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      margin-bottom: 20px;
    }

    input[type="text"] {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-right: 10px;
      flex: 1;
    }

    button {
      padding: 10px 15px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border-bottom: 1px solid #ccc;
      padding: 12px;
      text-align: center;
    }

    .present-btn {
      background: #28a745;
    }

    .absent-btn {
      background: #dc3545;
    }

    .delete-btn {
      background: #6c757d;
    }

    .logout-btn {
      background-color: #ff4d4d;
    }

    .percent {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h2>Subject Attendance Tracker</h2>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="input-group">
      <input type="text" id="subjectInput" placeholder="Enter subject name">
      <button id="addBtn">Add Subject</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Subject</th>
          <th>Attended</th>
          <th>Total</th>
          <th>Percentage</th>
          <th>Mark Attendance</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody id="subjectTable"></tbody>
    </table>
  </div>

  <script>
    const currentUser = localStorage.getItem("loggedInUser");
    if (!currentUser) window.location.href = "login.html";
    const STORAGE_KEY = `attendance_data_${currentUser}`;
    let subjects = [];

    window.onload = function () {
      const savedData = localStorage.getItem(STORAGE_KEY);
      if (savedData) {
        subjects = JSON.parse(savedData);
        renderTable();
      }

      document.getElementById('addBtn').addEventListener('click', addSubject);
    };

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(subjects));
    }

    function addSubject() {
      const subjectInput = document.getElementById('subjectInput');
      const subjectName = subjectInput.value.trim();

      if (subjectName === '') {
        alert("Please enter a subject name.");
        return;
      }

      if (subjects.some(sub => sub.name.toLowerCase() === subjectName.toLowerCase())) {
        alert("Subject already exists.");
        return;
      }

      subjects.push({
        name: subjectName,
        attended: 0,
        total: 0
      });

      subjectInput.value = '';
      saveData();
      renderTable();
    }

    function markAttendance(index, isPresent) {
      subjects[index].total += 1;
      if (isPresent) {
        subjects[index].attended += 1;
      }
      saveData();
      renderTable();
    }

    function deleteSubject(index) {
      if (confirm("Are you sure you want to delete this subject?")) {
        subjects.splice(index, 1);
        saveData();
        renderTable();
      }
    }

    function renderTable() {
      const tbody = document.getElementById('subjectTable');
      tbody.innerHTML = '';

      subjects.forEach((sub, index) => {
        const percent = sub.total === 0 ? '0%' : ((sub.attended / sub.total) * 100).toFixed(2) + '%';

        tbody.innerHTML += `
          <tr>
            <td>${sub.name}</td>
            <td>${sub.attended}</td>
            <td>${sub.total}</td>
            <td class="percent">${percent}</td>
            <td>
              <button class="present-btn" onclick="markAttendance(${index}, true)">Present</button>
              <button class="absent-btn" onclick="markAttendance(${index}, false)">Absent</button>
            </td>
            <td>
              <button class="delete-btn" onclick="deleteSubject(${index})">Delete</button>
            </td>
          </tr>
        `;
      });
    }

    function logout() {
      localStorage.removeItem("loggedInUser");
      window.location.href = "login.html";
    }
  </script>
</body>
</html>
